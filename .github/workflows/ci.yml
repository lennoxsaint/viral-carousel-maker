name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Install browser renderer runtime
        run: python -m playwright install --with-deps chromium
      - name: Render skill copies
        run: python scripts/render_skills.py
      - name: Check skill dist is current
        run: python scripts/render_skills.py --check
      - name: Tests
        run: pytest
      - name: Public proof artifacts
        run: python scripts/public_proof.py --check-gallery
