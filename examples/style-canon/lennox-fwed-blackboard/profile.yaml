handle: "@lennox_saint"
niche: "creator education"
sub_niche: "Threads growth mental models and AI-assisted content systems"
audience: "serious creators and founders who want posts people reply to, save, and share"
tone:
  primary: "cute, emotionally true, strategic, story-driven, direct"
  avoid:
    - "generic creator advice"
    - "corporate infographic voice"
    - "hype without a moral"
visual_preferences:
  styles:
    - "lennox_fwed_midnight_blackboard_fable"
    - "deep black chalkboard"
    - "cute storybook instruction sheet"
    - "raw handwritten chalk notes"
  colors:
    blackboard: "#050505"
    yellow: "#FCBF12"
    coral: "#E2665B"
    blue: "#4988F2"
    chalk: "#F7F0DF"
  avoid:
    - "hoodie on Lennox"
    - "loose top on Lennox"
    - "wrong glasses"
    - "generic Lennox face"
    - "photo-sticker Lennox instead of a caricature"
    - "black thick glasses on Lennox"
    - "missing silver rectangle pendant"
    - "missing Lennox moustache"
    - "pixel-only Fwed"
    - "generic vector art"
brand_colors:
  blackboard: "#050505"
  yellow: "#FCBF12"
  coral: "#E2665B"
  blue: "#4988F2"
  chalk: "#F7F0DF"
cta_default: "follow"
cta_defaults:
  pressure: "soft"
  comment_prompt: "What is your post missing: tension, replies, or save value?"
risk_appetite: 8
preferred_body_slide_count: 5
style_canon:
  name: "lennox_fwed_midnight_blackboard_fable"
  reference_lock: true
  doc: "docs/lennox-fwed-blackboard-style.md"
  production_renderer: "codex-native-imagegen"
  handle_position: "bottom-left"
  handle_text: "@lennox_saint"
  characters:
    fwed: "cute red bear protagonist, white muzzle, glossy black eyes, rounded plush chalk/storybook body"
    lennox: "caricature based on /Users/lennoxsaint/Documents/Growth/Lennox Saint/DP/Display photo final.png; dark side-swept hair with volume, slim oval face, neat dark moustache, clear transparent rounded-square glasses, warm smile, tight red t-shirt, silver chain, vertical rectangle pendant; never generic, never a pasted photo sticker"
  likeness_rules:
    - "If Lennox appears, use the identity reference image path and render him as a chalk/storybook caricature in the blackboard carousel style."
    - "Preserve dark side-swept hair, slim oval face, neat dark moustache, clear transparent rounded-square glasses, warm smile, red shirt, silver chain, and vertical rectangle pendant when visible."
    - "Do not render a generic teacher, black glasses, hoodie, loose top, missing moustache, or a pasted photo cutout."
  rejection_triggers:
    - "Lennox does not resemble the identity reference image."
    - "Lennox looks like a photo sticker instead of an illustrated caricature."
    - "Glasses are black, thick, or the wrong shape."
    - "Moustache is missing."
  signature_slide_1: "blue signal-shadow aura behind Fwed and the tiny yellow idea spark"
imagegen_policy:
  codex: "Use native Codex ImageGen / ChatGPT ImageGen 2 for final PNGs."
  claude_provider_order:
    - "Connected native image-generation provider"
    - "Gemini emergency fallback via GOOGLE_API_KEY or GEMINI_API_KEY"
  code_renderers: "Draft/spec-preview/QA fallback only, not final production unless explicitly accepted."
approved_reference_images:
